apiVersion: v1
kind: Pod
metadata:
  name: seccomp-runtime-default
  namespace: apps
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: demo
      image: busybox:1.36.1
      command: ["sh", "-c", "echo RuntimeDefault seccomp is active; sleep 10"]
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
