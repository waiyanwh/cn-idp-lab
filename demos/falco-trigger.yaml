apiVersion: v1
kind: Pod
metadata:
  name: falco-etc-write
  namespace: apps
spec:
  restartPolicy: Never
  containers:
    - name: trigger
      image: busybox:1.36.1
      command:
        - sh
        - -c
        - "sleep 5; touch /etc/test_file_for_falco_rule; sleep 30"
      securityContext:
        allowPrivilegeEscalation: false

