apiVersion: v1
kind: Service
metadata:
  name: {{ include "orders-api.name" . }}
  labels:
    {{- include "orders-api.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: {{ include "orders-api.name" . }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http

