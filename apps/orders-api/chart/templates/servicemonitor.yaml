{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "orders-api.name" . }}
  labels:
    {{- include "orders-api.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "orders-api.name" . }}
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
{{- end }}

