apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-secure-pod-context
  annotations:
    policies.kyverno.io/title: Require Secure Pod Context
    policies.kyverno.io/category: Pod Security
    policies.kyverno.io/severity: medium
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: require-runtime-defaults
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - apps
      validate:
        message: "App pods should run as non-root with the RuntimeDefault seccomp profile."
        pattern:
          spec:
            securityContext:
              runAsNonRoot: true
              seccompProfile:
                type: RuntimeDefault
